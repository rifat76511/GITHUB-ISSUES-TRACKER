<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issues-Tracker</title>
    <!-- page icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- style with css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-[#F8FAFC]">
    <nav class="mb-20">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img class="w-10" src="./assets/github-logo.png" alt="">
                    <p>GitHub Issues Tracker</p>
                </a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </nav>
    <main>
        <section class="w-9/12 mx-auto my-5">
            <div class="flex gap-3 p-4 bg-white rounded-xl shadow-sm">
                <div class="btn  ">All</div>
                <div class="btn  ">Open</div>
                <div class="btn  ">closed</div>
            </div>
        </section>
        <section class=" w-9/12 mx-auto bg-white rounded-xl shadow-sm ">
            <div class=" my-5">
                <div class="flex  justify-between p-4 bg-white rounded-xl shadow-sm w-full">
                    <div class="">
                        <div class="flex items-center gap-2">
                            <img src="./assets/Aperture.png" alt="" class="w-12 h-12 bg-[#ECE4FF] rounded-full p-2">
                            <div class="">
                                <h2 class="font-semibold text-xl"><span>50</span> Issues</h2>
                                <h5 class="text-xs inline">Track and manage your project issues</h5>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <p class="flex gap-1 items-center"><span
                                class="bg-green-600 text-green-600 rounded-full  w-3 h-3"></span> open</p>
                        <p class="flex gap-1 items-center"> <span class="bg-[#A855F7]  rounded-full  w-3 h-3"> </span>
                            closed</p>
                    </div>
                </div>
            </div>

            <section id="card-section" class="grid grid-cols-4 gap-6 p-6">
                


            </section>

        </section>
    </main>
    <!-- js file linked -->
    <script src="./script/main.js"></script>
</body>

</html>
