<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issues-Tracker</title>
    <!-- page icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- style with css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-[#F8FAFC]">
    <nav class="mb-20 ">
        <div class="flex lg:flex-row flex-col gap-4 navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img class="w-10" src="./assets/github-logo.png" alt="">
                    <p>GitHub Issues Tracker</p>
                </a>
            </div>
            <div class="flex gap-2">
              

<label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="Search-box" type="search" required placeholder="Search issues..." class="input input-bordered w-24 md:w-auto  "/>
</label>


                <button id="Search-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </nav>
    <main>
        <section class="w-9/12 mx-auto my-5">
            <div class="flex gap-3 p-4 bg-white rounded-xl shadow-sm allbtn">
                <div onclick="allbtnActive('all-btn'); filterIssues('all')" class="btn " id="all-btn">All
                </div>
                <div onclick="allbtnActive('open-btn'); filterIssues('open')" class="btn  " id="open-btn">Open</div>
                <div onclick="allbtnActive('closed-btn'); filterIssues('closed')" class="btn  " id="closed-btn">closed
                </div>
            </div>
        </section>
        <section class=" w-9/12 mx-auto bg-white rounded-xl shadow-sm ">
            <div class=" my-5">
                <div class="flex  justify-between p-4 bg-white rounded-xl shadow-sm w-full">
                    <div class="">
                        <div class="flex items-center gap-2">
                            <img src="./assets/Aperture.png" alt="" class="w-12 h-12 bg-[#ECE4FF] rounded-full p-2">
                            <div class="">
                                <h2 class="font-semibold text-lg lg:text-xl"><span id="count-issues">0</span> Issues</h2>
                                <h5 class="text-[8px] lg:text-xs inline">Track and manage your project issues</h5>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col lg:flex-row gap-3">
                        <p class="flex gap-1 items-center"><span
                                class="bg-green-600 text-green-600 rounded-full  w-3 h-3"></span> open</p>
                        <p class="flex gap-1 items-center"> <span class="bg-[#A855F7]  rounded-full  w-3 h-3"> </span>
                            closed</p>
                    </div>
                </div>
            </div>
            <section class="flex items-center justify-center p-20 hidden" id="loading-section">
                <span class="loading loading-dots loading-xl"></span>
            </section>
            <div id="card-section" class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">



            </div>

            <!-- Open the modal using ID.showModal() method -->
            
            <dialog id="iassueDitail" class="modal modal-bottom sm:modal-middle">
              
            </dialog>
        </section>

    </main>
    <!-- js file linked -->
    <script src="./script/main.js"></script>
</body>

</html>
